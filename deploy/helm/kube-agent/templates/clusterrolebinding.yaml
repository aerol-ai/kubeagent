{{- if and .Values.rbac.create (eq .Values.rbac.scope "ClusterRole") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-agent.fullname" . }}
  labels:
    {{- include "kube-agent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-agent.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-agent.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
