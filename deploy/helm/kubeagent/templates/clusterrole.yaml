{{- if and .Values.rbac.create (eq .Values.rbac.scope "ClusterRole") }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeagent.fullname" . }}
  labels:
    {{- include "kubeagent.labels" . | nindent 4 }}
rules:
  # Core resources: pods, services, configmaps, secrets, PVCs, events, namespaces, serviceaccounts
  - apiGroups: [""]
    resources: ["*"]
    verbs: ["*"]
  # Workloads: deployments, statefulsets, daemonsets, replicasets
  - apiGroups: ["apps"]
    resources: ["*"]
    verbs: ["*"]
  # Batch: jobs, cronjobs
  - apiGroups: ["batch"]
    resources: ["*"]
    verbs: ["*"]
  # Networking: ingresses, networkpolicies
  - apiGroups: ["networking.k8s.io"]
    resources: ["*"]
    verbs: ["*"]
  # RBAC: full write access so the agent can deploy Helm charts that create their own
  # Roles and ServiceAccount bindings (nearly every production chart does this)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # StorageClasses: read + patch/update so the agent can enable allowVolumeExpansion
  # on a StorageClass when PVC resize is needed. Other storage resources remain read-only.
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments", "csinodes", "csidrivers", "csistoragecapacities"]
    verbs: ["get", "list", "watch"]
  # Autoscaling and policy
  - apiGroups: ["autoscaling"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["policy"]
    resources: ["*"]
    verbs: ["*"]
  # CRDs: required for Helm charts that install custom resource definitions
  # (e.g. cert-manager, operators, monitoring stacks, Daytona)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Admission webhooks: required for Helm charts that install ValidatingWebhookConfigurations
  # or MutatingWebhookConfigurations (common in operators and security tools)
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["validatingwebhookconfigurations", "mutatingwebhookconfigurations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pod exec/log access for debugging
  - apiGroups: [""]
    resources: ["pods/exec", "pods/log", "pods/attach"]
    verbs: ["create", "get"]
{{- end }}
