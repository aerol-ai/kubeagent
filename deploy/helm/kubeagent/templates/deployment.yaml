apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubeagent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeagent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubeagent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubeagent.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kubeagent.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PLATFORM_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeagent.fullname" . }}
                  key: platform-url
            - name: AGENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kubeagent.fullname" . }}
                  key: agent-token
            - name: IN_CLUSTER
              value: "true"
            - name: AGENT_ID
              value: {{ .Values.agentId | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: COMMAND_TIMEOUT
              value: {{ .Values.commandTimeout | quote }}
            - name: RECONNECT_INTERVAL
              value: {{ .Values.reconnectInterval | quote }}
            - name: MAX_RECONNECT_INTERVAL
              value: {{ .Values.maxReconnectInterval | quote }}
            - name: HEARTBEAT_INTERVAL
              value: {{ .Values.heartbeatInterval | quote }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
