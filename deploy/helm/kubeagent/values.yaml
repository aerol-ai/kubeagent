# Agent image
image:
  repository: ghcr.io/aerol-ai/kubeagent
  tag: "latest"
  pullPolicy: Always

# Number of agent replicas (typically 1)
replicaCount: 1

# Platform connection
# The agent connects DIRECTLY to the Agent Gateway container (port 8080).
# No reverse proxy or Next.js in the path.
# Format: wss://<gateway-host-or-ip>:<gateway-port>/
# Example (K8s service): wss://agent-gateway.default.svc.cluster.local:8080/
# Example (public host):  wss://ws.aerol.ai/
platform:
  url: "wss://ws.aerol.ai/"
  # Set via --set or secret
  token: ""

# Agent ID (auto-generated if empty)
agentId: ""

# Logging
logLevel: "info"

# Timeouts (seconds)
commandTimeout: 60
reconnectInterval: 5
maxReconnectInterval: 300
heartbeatInterval: 30

# ServiceAccount
serviceAccount:
  create: true
  name: ""
  annotations: {}

# RBAC - full cluster access by default
rbac:
  create: true
  # Set to "ClusterRole" for cluster-wide access, "Role" for namespace-scoped
  scope: "ClusterRole"
  # Only used when scope is "Role". List of namespaces the agent should have access to.
  # If empty, defaults to the release namespace (--namespace value).
  # Example: ["production", "staging", "dev"]
  namespaces: []

# Resources
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Auto-upgrade feature based on the latest semver tag in the remote image registry
autoUpgrade:
  enabled: true
  repository: "ghcr.io/aerol-ai/kubeagent"
  intervalSeconds: 60
